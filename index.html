<html>

<body>
  <button id="authorize-button" style="visibility: hidden">Authorize</button>
  <script src="https://cdn.anychart.com/releases/8.0.0/js/anychart-base.min.js"></script>
  <script src="./js.js" type="text/javascript"></script>
  <script src="https://apis.google.com/js/auth.js?onload=init"></script>
  <div id="container" style="width: 100%; height: 100%"></div>
  <script>
    function handleTqResponse(resp) {
      console.log("log(labqui.github.io:48)", resp)

      // Start the Chart creation
      // anychart.onDocumentReady(function () {

        // Fetch Data from the API
        fetch('https://api.apispreadsheets.com/data/422/?dataFormat=matrix')
          .then((response) => {
            return response.json();
          })
          .then((myJson) => {

            // create data variable for the chart
            var data = {
              header: ["x", "y"],
              rows: [["A", 2], ["B", 5], ["C", 6], ["D", 2]]
            }

            // create the chart
            var chart = anychart.column();

            // add the data
            chart.data(data);

            // set the chart title
            chart.title("Super Bowl Wins");

            // draw
            chart.container("container");
            chart.draw();
            console.log("log(labqui.github.io:41)", "draw")
          });
      // });

      // document.write(JSON.stringify(resp));
    }
  </script>
</body>

</html>
